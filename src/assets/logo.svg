<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 110" role="img" aria-label="Logo NarrativePath">
  <!-- Pictogramme : livre ouvert qui se transforme en chemin -->
  <g transform="translate(10,15)">
    <path d="M0 10 C 14 0, 30 0, 40 10 V 70 C 30 62, 14 62, 0 70 Z" fill="#4338ca" />
    <path d="M80 10 C 66 0, 50 0, 40 10 V 70 C 50 62, 66 62, 80 70 Z" fill="#6366f1" />
    <path d="M40 10 V70" stroke="#312e81" stroke-width="2" opacity="0.4" />
    <!-- petit chemin/étoile qui s'échappe du livre -->
    <path d="M40 38 C 55 30, 65 45, 80 35" fill="none" stroke="#facc15" stroke-width="4" stroke-linecap="round" stroke-dasharray="1 9" />
    <circle cx="84" cy="33" r="4" fill="#facc15" />
  </g>

  <!-- Texte du logo -->
  <text x="110" y="50" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="34" font-weight="700" fill="#312e81">
    Narrative<tspan fill="#6366f1">Path</tspan>
  </text>
  <text x="111" y="74" font-family="'Trebuchet MS', 'Segoe UI', sans-serif" font-size="14" fill="#64748b">
    Ton histoire, tes choix
  </text>
</svg>
