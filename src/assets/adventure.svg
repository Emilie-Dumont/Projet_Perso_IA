<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="Illustration style aventure : carte au trésor et forêt">
  <defs>
    <linearGradient id="adv-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#c7d2fe" />
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="800" height="300" rx="24" fill="url(#adv-sky)" />

  <!-- Collines lointaines -->
  <path d="M0 220 Q 100 180 220 215 T 460 210 T 800 220 V300 H0 Z" fill="#a5b4fc" opacity="0.6" />

  <!-- Forêt (silhouettes d'arbres) -->
  <g fill="#4338ca" opacity="0.85">
    <path d="M90 230 L120 160 L150 230 Z" />
    <path d="M120 230 L150 150 L180 230 Z" />
    <path d="M650 235 L680 165 L710 235 Z" />
    <path d="M680 235 L710 155 L740 235 Z" />
  </g>

  <!-- Sol -->
  <path d="M0 235 Q 200 215 400 240 T 800 230 V300 H0 Z" fill="#818cf8" />

  <!-- Chemin sinueux -->
  <path d="M60 280 C 200 250, 250 220, 350 230 C 450 240, 480 200, 600 190 C 680 185, 700 170, 760 150"
        fill="none" stroke="#fef3c7" stroke-width="14" stroke-linecap="round" stroke-dasharray="2 22" />
  <path d="M60 280 C 200 250, 250 220, 350 230 C 450 240, 480 200, 600 190 C 680 185, 700 170, 760 150"
        fill="none" stroke="#a16207" stroke-width="14" stroke-linecap="round" opacity="0.25" />

  <!-- X du trésor -->
  <g stroke="#dc2626" stroke-width="6" stroke-linecap="round">
    <path d="M725 130 L755 160" />
    <path d="M755 130 L725 160" />
  </g>
  <circle cx="740" cy="145" r="34" fill="none" stroke="#4338ca" stroke-width="2" stroke-dasharray="4 6" opacity="0.5" />

  <!-- Petit coffre au trésor -->
  <g transform="translate(170,175)">
    <rect x="0" y="14" width="60" height="30" rx="4" fill="#92400e" />
    <path d="M0 14 Q 30 -10 60 14" fill="#b45309" />
    <rect x="24" y="10" width="12" height="10" rx="2" fill="#facc15" />
  </g>

  <!-- Boussole décorative -->
  <g transform="translate(420,90)">
    <circle r="22" fill="#fef9c3" stroke="#4338ca" stroke-width="3" />
    <path d="M0 -14 L6 0 L0 14 L-6 0 Z" fill="#dc2626" />
  </g>
</svg>
