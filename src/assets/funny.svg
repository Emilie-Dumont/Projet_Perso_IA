<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" role="img" aria-label="Illustration style rigolo : formes rondes et couleurs vives">
  <defs>
    <linearGradient id="fun-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9c3" />
      <stop offset="100%" stop-color="#fde68a" />
    </linearGradient>
  </defs>

  <!-- Fond -->
  <rect x="0" y="0" width="800" height="300" rx="24" fill="url(#fun-bg)" />

  <!-- Confettis ronds -->
  <g opacity="0.9">
    <circle cx="80" cy="60" r="10" fill="#f472b6" />
    <circle cx="140" cy="40" r="7" fill="#34d399" />
    <circle cx="200" cy="70" r="9" fill="#60a5fa" />
    <circle cx="650" cy="50" r="8" fill="#fb923c" />
    <circle cx="710" cy="80" r="11" fill="#a78bfa" />
    <circle cx="600" cy="35" r="6" fill="#f87171" />
    <circle cx="40" cy="220" r="8" fill="#38bdf8" />
    <circle cx="760" cy="220" r="9" fill="#fbbf24" />
  </g>

  <!-- Vague de couleur en bas -->
  <path d="M0 240 Q 200 200 400 240 T 800 240 V300 H0 Z" fill="#fb7185" opacity="0.7" />
  <path d="M0 260 Q 200 230 400 260 T 800 260 V300 H0 Z" fill="#fdba74" opacity="0.7" />

  <!-- Gros visage rond souriant -->
  <g transform="translate(400,150)">
    <circle r="90" fill="#facc15" stroke="#ea580c" stroke-width="4" />
    <!-- yeux -->
    <circle cx="-32" cy="-20" r="11" fill="#4338ca" />
    <circle cx="32" cy="-20" r="11" fill="#4338ca" />
    <circle cx="-28" cy="-24" r="3" fill="#ffffff" />
    <circle cx="36" cy="-24" r="3" fill="#ffffff" />
    <!-- joues -->
    <circle cx="-55" cy="10" r="12" fill="#fb7185" opacity="0.6" />
    <circle cx="55" cy="10" r="12" fill="#fb7185" opacity="0.6" />
    <!-- grand sourire -->
    <path d="M-45 25 Q 0 70 45 25" fill="none" stroke="#9a3412" stroke-width="7" stroke-linecap="round" />
  </g>

  <!-- Étoiles ludiques -->
  <g fill="#22c55e">
    <path d="M150 200 l8 18 19 2 -14 13 4 19 -17 -10 -17 10 4 -19 -14 -13 19 -2 z" opacity="0.85" />
  </g>
  <g fill="#38bdf8">
    <path d="M630 190 l7 15 16 2 -12 11 3 16 -14 -8 -14 8 3 -16 -12 -11 16 -2 z" opacity="0.85" />
  </g>
</svg>
